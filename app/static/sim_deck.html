<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransitFlow | Sim-Deck</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0c10;
            --accent-primary: #00f2ff;
            --accent-danger: #ff4b2b;
            --accent-warning: #ffb400;
        }
        body {
            background-color: var(--bg-deep);
            color: white;
            font-family: 'Inter', sans-serif;
        }
        .headline { font-family: 'Space Grotesk', sans-serif; }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
        }
        .btn-glow {
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .btn-glow:hover {
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="p-8">
    <div class="max-w-2xl mx-auto">
        <header class="mb-12 text-center">
            <h1 class="text-4xl font-black headline text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 uppercase tracking-tighter">
                Supervisor | Sim-Deck
            </h1>
            <p class="text-slate-500 text-sm mt-2 font-bold uppercase tracking-widest">Phase 2 Event Simulation Interface</p>
        </header>

        <div class="grid grid-cols-1 gap-6">
            <!-- Flood Simulation -->
            <div class="glass p-6 border-l-4 border-l-cyan-500">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-black headline">Flash Flood Alert</h2>
                    <span class="px-2 py-1 bg-cyan-500/10 text-cyan-400 text-[10px] font-bold rounded uppercase">Env Trigger</span>
                </div>
                <div class="flex gap-4">
                    <button onclick="publishAlert('flood', 'Critical: Flash flood reported in Shah Alam Section 13. Expect road closures.')" 
                            class="flex-1 py-3 bg-cyan-500/10 hover:bg-cyan-500/20 border border-cyan-500/30 text-cyan-400 font-bold rounded-lg btn-glow">
                        Trigger Section 13
                    </button>
                    <button onclick="publishAlert('flood', 'Warning: Heavy rainfall in Subang Jaya. Flash flood risk elevated.')" 
                            class="flex-1 py-3 bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold rounded-lg transition-all">
                        Elevate Risk (Subang)
                    </button>
                </div>
            </div>

            <!-- Transit Delay Simulation -->
            <div class="glass p-6 border-l-4 border-l-amber-500">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-black headline">Transit Delay</h2>
                    <span class="px-2 py-1 bg-amber-500/10 text-amber-400 text-[10px] font-bold rounded uppercase">Network Trigger</span>
                </div>
                <div class="flex gap-4">
                    <button onclick="publishAlert('delay', 'LRT Kelana Jaya Line: 15 min delay due to signal interference at SS15.')" 
                            class="flex-1 py-3 bg-amber-500/10 hover:bg-amber-500/20 border border-amber-500/30 text-amber-400 font-bold rounded-lg btn-glow">
                        SS15 Signal Fault
                    </button>
                    <button onclick="publishAlert('delay', 'MRT Putrajaya Line: Service normalized. Expect residual delays.')" 
                            class="flex-1 py-3 bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold rounded-lg transition-all">
                        Normalization
                    </button>
                </div>
            </div>

            <!-- Stadium Traffic Simulation -->
            <div class="glass p-6 border-l-4 border-l-purple-500">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-black headline">Stadium Game-Day</h2>
                    <span class="px-2 py-1 bg-purple-500/10 text-purple-400 text-[10px] font-bold rounded uppercase">Event Trigger</span>
                </div>
                <div class="flex gap-4">
                    <button onclick="publishAlert('delay', 'Stadium Alert: Heavy congestion around Bukit Jalil. Avoid car travel if possible. Use LRT.')" 
                            class="flex-1 py-3 bg-purple-500/10 hover:bg-purple-500/20 border border-purple-500/30 text-purple-400 font-bold rounded-lg btn-glow">
                        Trigger Bukit Jalil Surge
                    </button>
                    <button onclick="publishAlert('delay', 'Stadium Alert: Shah Alam Stadium vicinity experiencing high motorbike traffic. Safety index: CAUTION.')" 
                            class="flex-1 py-3 bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold rounded-lg transition-all">
                        Shah Alam Surge
                    </button>
                </div>
            </div>

            <!-- Clear Feed -->
            <button onclick="publishAlert('system', 'System: All alerts cleared.')" 
                    class="w-full py-4 mt-6 glass hover:bg-white/5 text-slate-400 font-bold uppercase text-xs tracking-widest border-dashed">
                Clear Real-time Feed
            </button>
        </div>

        <div id="log" class="mt-12 font-mono text-[10px] text-slate-600 space-y-1">
            <!-- Event Logs -->
        </div>
    </div>

    <script>
        async function publishAlert(type, message) {
            const log = document.getElementById('log');
            const entry = document.createElement('div');
            entry.innerText = `[${new Date().toLocaleTimeString()}] Pushing ${type} event...`;
            log.prepend(entry);

            try {
                const response = await fetch('/publish', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type, message, timestamp: new Date().toISOString() })
                });
                
                if (response.ok) {
                    entry.classList.add('text-cyan-400');
                    entry.innerText += ' SUCCESS';
                } else {
                    entry.classList.add('text-red-400');
                    entry.innerText += ' FAILED';
                }
            } catch (err) {
                entry.classList.add('text-red-400');
                entry.innerText += ' ERROR: ' + err.message;
            }
        }
    </script>
</body>
</html>
